<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin the Wheel!</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="wheel-page">
    <div class="wheel-container">
        <div class="wheel-pointer"></div>
        <div class="wheel">
            <div class="wheel-slice" style="--i:0;"><span>หมาล่า</span></div>
            <div class="wheel-slice" style="--i:1;"><span>สุ่มใหม่</span></div>
            <div class="wheel-slice" style="--i:2;"><span>ชินคันเสน</span></div>
            <div class="wheel-slice" style="--i:3;"><span>เค้ก</span></div>
            <div class="wheel-slice" style="--i:4;"><span>อดจ้า</span></div>
            <div class="wheel-slice" style="--i:5;"><span>เงิน</span></div>
        </div>
        <button id="spin-btn" class="btn">หมุน!</button>
    </div>
    <script src="js/script.js"></script>
</body>
</html>

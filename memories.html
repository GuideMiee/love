  <style>
    body {
      font-family: 'Kanit', sans-serif;
    }

    .text-shadow {
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.6);
    }


    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      /* Place it behind all content */
    }

    /* Seamless slider animation */
    .slider-track {
      display: flex;
      /* Animation: name, duration, timing-function, iteration-count */
      animation: scroll 1s linear infinite;
    }

    .slider-container:hover .slider-track {
      animation-play-state: paused;
    }

    @keyframes scroll {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }

      /* Stop at half to create loop */
    }
  </style>
  <style>
    .slider-track {
      display: flex;
      will-change: transform;
      animation: scroll var(--scroll-duration, 1s) linear infinite;
    }

    .slider-container:hover .slider-track {
      animation-play-state: paused;
      /* hover เพื่อหยุดชั่วคราว */
    }

    @keyframes scroll {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }

      /* เลื่อนไปครึ่งหนึ่งเพราะเรา duplicate 1 ชุด */
    }
  </style>
  <script>
    // ===== Config =====
    const COUNT = 53;     // จำนวนรูป (pic1..pic53)
    const SPEED_PX_S = 1; // ความเร็ว ~ px ต่อวินาที (ปรับได้ตามใจ)

    // ===== Build images 1..53 แล้ว duplicate 1 ชุด เพื่อวนลูปเนียน =====
    const track = document.querySelector('.slider-track');

    // สร้างรูป 1..53
    const imgs = Array.from({ length: COUNT }, (_, i) => i + 1)
      .map(n => {
        const img = document.createElement('img');
        img.src = `images/pic${n}.jpg`;
        img.alt = `Memory ${n}`;
        img.className = 'h-[550px] rounded-lg mx-2 object-cover';
        return img;
      });

    // ใส่รูปชุดแรก
    track.append(...imgs);
    // ก็อปรูปทั้งชุดอีกครั้งเพื่อทำ seamless loop
    track.append(...imgs.map(node => {
      const clone = node.cloneNode(true);
      return clone;
    }));

    // ===== คำนวณความเร็วอัตโนมัติจากความกว้างจริงของ "ชุดแรก" =====
    function setDuration() {
      // ความกว้างของรูปชุดแรก = ครึ่งหนึ่งของความกว้างทั้งหมด (เพราะเรา duplicate)
      const totalWidth = track.scrollWidth / 2; // px
      const duration = totalWidth / SPEED_PX_S; // วินาที
      track.style.setProperty('--scroll-duration', `${duration}s`);
    }

    // รอให้รูปโหลดเสร็จบางส่วนค่อยคำนวณ (กันค่ากว้างเพี้ยน)
    const onReady = () => {
      setDuration();
      // เผื่อหน้าต่างถูกย่อ/ขยาย ปรับใหม่
      window.addEventListener('resize', setDuration);
    };

    // ถ้ารูปจำนวนมาก อาจยังโหลดไม่ครบ ใช้ requestAnimationFrame เป็น buffer สั้น ๆ
    if (document.readyState === 'complete') {
      requestAnimationFrame(onReady);
    } else {
      window.addEventListener('load', () => requestAnimationFrame(onReady));
    }
  </script>

    <audio id="bgm" src="audio/sound.mp3" autoplay loop></audio>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const bgm = document.getElementById("bgm");

        // ตั้งค่าเสียงเบาๆ (เช่น 10% ของระดับเต็ม)
        bgm.volume = 0.1;

        // บาง browser ต้องใช้ mute/unmute trick เพื่อให้ autoplay ทำงาน
        bgm.muted = true;
        bgm.play().then(() => {
          // เปิดเสียงหลังเริ่มเล่นแล้ว (จะไม่มี popup เตือน)
          setTimeout(() => {
            bgm.muted = false;
          }, 300); // ดีเลย์เล็กน้อย
        }).catch(err => console.warn("autoplay ถูกบล็อกโดย browser:", err));
      });

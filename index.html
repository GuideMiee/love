<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Anniversary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
        }

        .text-shadow {
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.6);
        }

        /* Canvas for particle effect */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            /* Place it behind all content */
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center p-4">

    <canvas id="particle-canvas"></canvas>

    <main
        class="w-full max-w-3xl bg-black/30 backdrop-blur-xl rounded-2xl shadow-2xl p-6 md:p-10 text-white text-center z-10">

        <h1 class="text-4xl md:text-5xl font-bold text-shadow mb-4">สุขสันต์วันครบรอบของเรา</h1>
        <p class="text-lg md:text-xl text-gray-200 mb-8 text-shadow">
            ขอบคุณสำหรับทุกช่วงเวลาที่ผ่านมา ดีใจที่มีเธออยู่ข้างๆ เสมอมา อยู่ด้วยกันไปนานๆ นะ รักมากๆ เลย
        </p>

        <div class="space-y-6">
            <div class="grid grid-cols-3 gap-4">
                <div class="bg-white/20 p-4 rounded-xl">
                    <span id="years" class="text-4xl md:text-5xl font-bold tracking-wider">0</span>
                    <p class="text-sm uppercase mt-1">ปี</p>
                </div>
                <div class="bg-white/20 p-4 rounded-xl">
                    <span id="months" class="text-4xl md:text-5xl font-bold tracking-wider">0</span>
                    <p class="text-sm uppercase mt-1">เดือน</p>
                </div>
                <div class="bg-white/20 p-4 rounded-xl">
                    <span id="days" class="text-4xl md:text-5xl font-bold tracking-wider">0</span>
                    <p class="text-sm uppercase mt-1">วัน</p>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <div class="bg-white/20 p-4 rounded-xl">
                    <span id="total-days" class="text-4xl md:text-5xl font-bold tracking-wider">0</span>
                    <p class="text-sm uppercase mt-1">รวมวัน</p>
                </div>
                <div class="bg-white/20 p-4 rounded-xl">
                    <span id="hours" class="text-4xl md:text-5xl font-bold tracking-wider">0</span>
                    <p class="text-sm uppercase mt-1">ชั่วโมง</p>
                </div>
                <div class="bg-white/20 p-4 rounded-xl">
                    <span id="minutes" class="text-4xl md:text-5xl font-bold tracking-wider">0</span>
                    <p class="text-sm uppercase mt-1">นาที</p>
                </div>
            </div>
        </div>

        <a href="memories.html"
            class="mt-10 inline-block bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transform hover:scale-105 transition-all duration-300 ease-in-out">
            ชมความทรงจำของเรา
        </a>

    </main>

    <script src="js/particles.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
